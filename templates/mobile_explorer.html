{% extends 'base.html' %}

{% block content %}

<section class="py-20 px-6 bg-gray-100 min-h-screen">

    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-xl p-10">

        <h1 class="text-4xl font-bold mb-10 text-center">
            AI Mobile Explorer
        </h1>

        <!-- FORM -->
        <form method="POST"  action="/recommendations/" class="space-y-6">

            {% csrf_token %}

            <!-- BRAND -->
            <div>
                <label class="block mb-2 font-semibold">
                    Brand
                </label>

                <input
                    type="text"
                    name="brand"
                    placeholder="Samsung"
                    class="w-full border p-4 rounded-xl"
                    required
                >
            </div>

            <!-- BUDGET -->
            <div>
                <label class="block mb-2 font-semibold">
                    Budget
                </label>

                <input
                    type="number"
                    name="budget"
                    placeholder="30000"
                    class="w-full border p-4 rounded-xl"
                    required
                >
            </div>

            <!-- USAGE -->
            <div>
                <label class="block mb-2 font-semibold">
                    Usage Type
                </label>

                <select
                    name="usage"
                    class="w-full border p-4 rounded-xl"
                    required
                >
                    <option value="daily">Daily Use</option>
                    <option value="gaming">Gaming</option>
                    <option value="student">Student</option>
                    <option value="camera">Camera</option>
                    <option value="business">Business</option>
                </select>
            </div>

            <button
                type="submit"
                class="w-full bg-blue-600 text-white py-4 rounded-xl text-lg font-semibold hover:bg-blue-700"
            >
                Get AI Recommendations
            </button>

        </form>
        

    </div>

</section>

{% endblock %}
