<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Device Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">

    <nav class="bg-white shadow px-8 py-4 flex justify-between">
        <h1 class="text-2xl font-bold text-blue-600">Smart Device Explorer</h1>
        <div class="space-x-4">

    <a href="/" class="hover:text-blue-600">
        Home
    </a>

    {% if user.is_authenticated %}

        <span class="text-gray-700 font-semibold">
            Hello, {{ user.username }}
        </span>

        <a href="/favorites/" class="hover:text-blue-600">
            Favorites
        </a>

        <a href="/users/logout/" class="text-red-600 hover:text-red-800">
            Logout
        </a>

    {% else %}

        <a href="/users/login/" class="hover:text-blue-600">
            Login
        </a>

        <a href="/users/register/" class="hover:text-blue-600">
            Register
        </a>

    {% endif %}

</div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-gray-900 text-white text-center py-4 mt-10">
        <p>© 2026 Smart Device Explorer | AI Powered Device Recommendation</p>
    </footer>

</body>
</html>
