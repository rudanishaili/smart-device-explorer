{% extends 'base.html' %}

{% block content %}

<div class="flex justify-center items-center min-h-screen">
    
    <form method="POST" class="bg-white p-8 rounded-xl shadow-md w-96">
        {% csrf_token %}

        <h2 class="text-3xl font-bold mb-6 text-center">
            Register
        </h2>

        <input 
            type="text"
            name="username"
            placeholder="Username"
            class="w-full border p-3 rounded mb-4"
            required
        >

        <input 
            type="email"
            name="email"
            placeholder="Email"
            class="w-full border p-3 rounded mb-4"
            required
        >

        <input 
            type="password"
            name="password"
            placeholder="Password"
            class="w-full border p-3 rounded mb-4"
            required
        >

        <input 
            type="password"
            name="confirm_password"
            placeholder="Confirm Password"
            class="w-full border p-3 rounded mb-4"
            required
        >

        <button 
            type="submit"
            class="w-full bg-blue-600 text-white py-3 rounded hover:bg-blue-700"
        >
            Register
        </button>

        <p class="mt-4 text-center">
            Already have an account?
            <a href="/users/login/" class="text-blue-600">
                Login
            </a>
        </p>

    </form>

</div>

{% endblock %}
